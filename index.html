<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#ff4e8a,#ff8fb1,#ffd1dc);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,.25);
max-width:360px;
text-align:center;
animation:aparecer 1.5s;
position:relative;
z-index:2;
}

img{
width:220px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
}

h1{
color:#ff2d75;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.6;
color:#555;
}

button{
margin-top:25px;
padding:12px 25px;
border:none;
background:#ff2d75;
color:white;
font-size:18px;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff0f63;
}

.corazon{
position:absolute;
color:#fff;
font-size:24px;
animation:caer linear infinite;
opacity:.8;
}

@keyframes caer{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(110vh);
}
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>

<body>

<div class="card">

<img src="foto.jpg" alt="Nosotros">

<h1>Para el Amor de Mi Vida ❤️</h1>

<p>
Cada día contigo es el regalo más hermoso que la vida me pudo dar.
Gracias por hacerme tan feliz.
Te amo con todo mi corazón y quiero seguir escribiendo nuestra historia por siempre.
</p>

<button onclick="mensaje()">
❤️ Tócame ❤️
</button>

</div>

<script>

function mensaje(){
alert("Eres mi capibara. ❤️ Te quiero muchoooo.");
}

for(let i=0;i<40;i++){

let c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(4+Math.random()*6)+"s";
c.style.fontSize=(15+Math.random()*30)+"px";
c.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(c);

}

</script>

</body>
</html>
